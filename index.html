<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claro Updates</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    body {
      margin: 0;
      padding: 48px 24px;
      background: Canvas;
      color: CanvasText;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: color-mix(in srgb, CanvasText 76%, transparent);
    }

    a {
      color: LinkText;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Claro Updates</h1>
    <p>Claro for macOS checks GitHub Releases for signed app updates.</p>
    <p><a href="appcast.xml">Sparkle appcast</a></p>
    <p><a href="https://github.com/petit-software/claro-updates/releases">GitHub releases</a></p>
  </main>
</body>
</html>
